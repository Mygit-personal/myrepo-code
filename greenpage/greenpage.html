<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Green-page | Evergreen Essence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 25% 35%, #3fa63f, #1f7a2e, #0a4a1a);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, 'Segoe UI', 'SF Pro Text', 'Poppins', sans-serif;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 15% 60%, rgba(180, 240, 140, 0.12) 1.8px, transparent 1.8px),
                radial-gradient(circle at 85% 25%, rgba(200, 255, 160, 0.1) 1.2px, transparent 1.2px);
            background-size: 52px 52px, 38px 38px;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: repeating-linear-gradient(115deg,
                    rgba(160, 220, 120, 0.03) 0px,
                    rgba(160, 220, 120, 0.03) 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 6px);
        }

        .hero {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 90%;
            width: 100%;
            animation: fadeInUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        h1 {
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #e8ffdc 10%, #c0f0a0 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            padding: 0.2em 0.4em;
            margin-bottom: 0.5rem;
        }

        @supports not (background-clip: text) {
            h1 {
                color: #e2ffcf;
                text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
                background: none;
            }
        }

        h1:hover {
            transform: scale(1.01);
            letter-spacing: -0.005em;
        }

        .accent-line {
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, #a6e07a, #4cae3a, #257520);
            border-radius: 4px;
            margin: 1.2rem auto 0 auto;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
            transition: width 0.4s ease;
        }

        .hero:hover .accent-line {
            width: 140px;
        }

        .ambient-glow {
            position: fixed;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(120, 210, 90, 0.12) 0%, rgba(30, 80, 20, 0) 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowDrift 18s infinite alternate ease-in-out;
        }

        .ambient-glow-second {
            position: fixed;
            bottom: -20%;
            right: -25%;
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse, rgba(90, 180, 70, 0.15) 0%, rgba(20, 70, 10, 0) 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowDriftReverse 22s infinite alternate;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(32px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slowDrift {
            0% {
                transform: translate(0%, 0%) rotate(0deg);
            }

            100% {
                transform: translate(5%, 4%) rotate(3deg);
            }
        }

        @keyframes slowDriftReverse {
            0% {
                transform: translate(0%, 0%) rotate(0deg);
            }

            100% {
                transform: translate(-6%, -3%) rotate(-2deg);
            }
        }

        .fine-print {
            position: relative;
            z-index: 2;
            margin-top: 3rem;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(235, 255, 210, 0.9);
            background: rgba(30, 70, 20, 0.35);
            backdrop-filter: blur(3px);
            padding: 0.45rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            border: 0.5px solid rgba(150, 210, 110, 0.4);
            font-family: monospace;
        }

        .fine-print:hover {
            background: rgba(45, 95, 30, 0.55);
            color: #ffffe0;
        }

        @media (max-width: 640px) {
            body {
                padding: 1.5rem;
            }

            .fine-print {
                font-size: 0.7rem;
                margin-top: 2rem;
            }

            .accent-line {
                width: 65px;
                height: 3px;
            }

            .hero:hover .accent-line {
                width: 100px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .ambient-glow,
            .ambient-glow-second {
                animation: none;
            }

            h1,
            .accent-line,
            .hero {
                animation: none;
                transition: none;
            }

            h1:hover {
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-second"></div>
    <div class="hero">
        <h1>Hello, This is my Green Page</h1>
        <div class="accent-line" aria-hidden="true"></div>
        <div class="fine-print">✦ fresh canopy ✦</div>
    </div>
</body>

</html>
