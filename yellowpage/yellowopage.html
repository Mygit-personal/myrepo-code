<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yellow-page | Radiant Glow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #f9e45b, #f5bc2c, #e09d00);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, 'Segoe UI', 'SF Pro Text', 'Poppins', sans-serif;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 20% 70%, rgba(255, 240, 150, 0.2) 1.5px, transparent 1.5px),
                radial-gradient(circle at 80% 30%, rgba(255, 200, 80, 0.15) 1px, transparent 1px);
            background-size: 50px 50px, 36px 36px;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: repeating-linear-gradient(115deg,
                    rgba(255, 220, 100, 0.04) 0px,
                    rgba(255, 220, 100, 0.04) 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 6px);
        }

        .hero {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 90%;
            width: 100%;
            animation: fadeInUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        h1 {
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #fff8e0 10%, #ffea9e 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            padding: 0.2em 0.4em;
            margin-bottom: 0.5rem;
        }

        @supports not (background-clip: text) {
            h1 {
                color: #fff3cf;
                text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
                background: none;
            }
        }

        h1:hover {
            transform: scale(1.01);
            letter-spacing: -0.005em;
        }

        .accent-line {
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, #ffdd77, #f5b81b, #d48f0b);
            border-radius: 4px;
            margin: 1.2rem auto 0 auto;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
            transition: width 0.4s ease;
        }

        .hero:hover .accent-line {
            width: 140px;
        }

        .ambient-glow {
            position: fixed;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255, 210, 70, 0.15) 0%, rgba(200, 130, 20, 0) 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowDrift 18s infinite alternate ease-in-out;
        }

        .ambient-glow-second {
            position: fixed;
            bottom: -20%;
            right: -25%;
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse, rgba(255, 180, 40, 0.2) 0%, rgba(160, 100, 10, 0) 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowDriftReverse 22s infinite alternate;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(32px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slowDrift {
            0% {
                transform: translate(0%, 0%) rotate(0deg);
            }

            100% {
                transform: translate(5%, 4%) rotate(3deg);
            }
        }

        @keyframes slowDriftReverse {
            0% {
                transform: translate(0%, 0%) rotate(0deg);
            }

            100% {
                transform: translate(-6%, -3%) rotate(-2deg);
            }
        }

        .fine-print {
            position: relative;
            z-index: 2;
            margin-top: 3rem;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(50, 30, 5, 0.85);
            background: rgba(255, 240, 170, 0.3);
            backdrop-filter: blur(3px);
            padding: 0.45rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            border: 0.5px solid rgba(200, 150, 20, 0.4);
            font-family: monospace;
        }

        .fine-print:hover {
            background: rgba(255, 225, 120, 0.5);
            color: #2f2100;
        }

        @media (max-width: 640px) {
            body {
                padding: 1.5rem;
            }

            .fine-print {
                font-size: 0.7rem;
                margin-top: 2rem;
            }

            .accent-line {
                width: 65px;
                height: 3px;
            }

            .hero:hover .accent-line {
                width: 100px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .ambient-glow,
            .ambient-glow-second {
                animation: none;
            }

            h1,
            .accent-line,
            .hero {
                animation: none;
                transition: none;
            }

            h1:hover {
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-second"></div>
    <div class="hero">
        <h1>Hello, This is my Yellow Page</h1>
        <div class="accent-line" aria-hidden="true"></div>
        <div class="fine-print">✦ golden hour ✦</div>
    </div>
</body>

</html>
