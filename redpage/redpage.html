<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Red-page | Crimson Essence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* deep, rich red gradient background — proper, elegant, immersive */
            background: radial-gradient(circle at 20% 30%, #c42a2a, #941919, #5a0a0a);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, 'Segoe UI', 'SF Pro Text', 'Poppins', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            padding: 2rem;
            position: relative;
            /* subtle texture via pseudo-element (see ::before) */
        }

        /* sophisticated micro-texture overlay: delicate grain + soft radial highlights */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 15% 45%, rgba(255, 220, 180, 0.08) 1.5px, transparent 1.5px),
                radial-gradient(circle at 75% 80%, rgba(255, 100, 80, 0.06) 1px, transparent 1px);
            background-size: 48px 48px, 32px 32px;
        }

        /* elegant noise / paper-like depth - second layer (gentle diagonal pattern) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: repeating-linear-gradient(115deg,
                    rgba(255, 200, 180, 0.02) 0px,
                    rgba(255, 200, 180, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 6px);
        }

        /* main content container – brings focus and readability with refined spacing */
        .red-hero {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 90%;
            width: 100%;
            animation: fadeInUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* Primary heading: bold, clean, with subtle red-luxury glow */
        h1 {
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #fff6ed;
            text-shadow:
                0 4px 18px rgba(0, 0, 0, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.3),
                0 0 8px rgba(230, 70, 50, 0.5);
            background: linear-gradient(135deg, #fff8f0 10%, #ffe0c4 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            /* enhance readability with slight overlay color fallback */
            transition: transform 0.25s ease, letter-spacing 0.2s;
            display: inline-block;
            padding: 0.2em 0.4em;
            margin-bottom: 0.5rem;
        }

        /* fallback for browsers that don't support background-clip: text */
        @supports not (background-clip: text) {
            h1 {
                color: #fff2e6;
                text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
                background: none;
            }
        }

        /* subtle hover effect that adds micro-interaction */
        h1:hover {
            transform: scale(1.01);
            letter-spacing: -0.005em;
        }

        /* optional underline accent – polished and minimal */
        .accent-line {
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, #ffa07a, #ff4d4d, #b91c1c);
            border-radius: 4px;
            margin: 1.2rem auto 0 auto;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
            transition: width 0.4s ease;
        }

        .red-hero:hover .accent-line {
            width: 140px;
        }

        /* subtle animated background shimmer (light reflection) - adds life to the red theme */
        .ambient-glow {
            position: fixed;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255, 100, 60, 0.08) 0%, rgba(160, 20, 20, 0) 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowDrift 18s infinite alternate ease-in-out;
        }

        /* second dynamic glow for dimensional background */
        .ambient-glow-second {
            position: fixed;
            bottom: -20%;
            right: -25%;
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse, rgba(210, 60, 30, 0.1) 0%, rgba(100, 15, 10, 0) 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowDriftReverse 22s infinite alternate;
        }

        /* keyframe animations for depth & premium feel */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(32px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slowDrift {
            0% {
                transform: translate(0%, 0%) rotate(0deg);
            }

            100% {
                transform: translate(5%, 4%) rotate(3deg);
            }
        }

        @keyframes slowDriftReverse {
            0% {
                transform: translate(0%, 0%) rotate(0deg);
            }

            100% {
                transform: translate(-6%, -3%) rotate(-2deg);
            }
        }

        /* optional small footnote to complement the red page vibe, non-intrusive */
        .fine-print {
            position: relative;
            z-index: 2;
            margin-top: 3rem;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            color: rgba(255, 235, 215, 0.75);
            background: rgba(30, 8, 6, 0.3);
            backdrop-filter: blur(3px);
            padding: 0.45rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            transition: background 0.2s;
            border: 0.5px solid rgba(255, 180, 140, 0.2);
            font-family: monospace;
        }

        .fine-print:hover {
            background: rgba(40, 12, 8, 0.55);
            color: rgba(255, 245, 235, 0.95);
            border-color: rgba(255, 160, 120, 0.5);
        }

        /* responsive & accessibility enhancements */
        @media (max-width: 640px) {
            body {
                padding: 1.5rem;
            }

            .fine-print {
                font-size: 0.7rem;
                margin-top: 2rem;
                padding: 0.3rem 1rem;
            }

            .accent-line {
                width: 65px;
                height: 3px;
            }

            .red-hero:hover .accent-line {
                width: 100px;
            }
        }

        /* fallback for reduced motion preferences */
        @media (prefers-reduced-motion: reduce) {

            .ambient-glow,
            .ambient-glow-second {
                animation: none;
            }

            h1,
            .accent-line,
            .red-hero {
                animation: none;
                transition: none;
            }

            h1:hover {
                transform: none;
            }
        }
    </style>
</head>

<body>

    <!-- immensive yet elegant ambient glows to amplify the "Red Page" proper background -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow-second"></div>

    <div class="red-hero">
        <h1>Hello, This is my Red Page</h1>
        <div class="accent-line" aria-hidden="true"></div>
        <!-- subtle elegant remark – does not distract from primary content, adds character -->
        <div class="fine-print">✦ crimson resonance ✦</div>
    </div>

</body>

</html>
